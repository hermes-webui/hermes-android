name: CI

# Build + unit-test gate for pushes and PRs. The repo previously had only the
# signed-release workflows (1/2/3-*), so nothing compiled or tested changes on a
# PR before merge. This adds that missing feedback loop without needing any
# signing secrets (debug build only).
on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Unit tests + debug build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.3

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
